<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body class="cosmic">
  <!-- Cosmic Canvas -->
  <canvas id="cosmicCanvas"></canvas>

  <!-- Text Overlay -->
  <div id="overlay">
    <p id="line1" class="type-line mono"></p>
    <h1 id="line2" class="type-line serif"></h1>
    <p id="line3" class="type-line mono"></p>
    <p id="line4" class="type-line mono accent"></p>
  </div>

  <!-- Nebula Labels Container (JS-populated) -->
  <div id="nebulaLabels"></div>

  <!-- Fallback nav (visible if JS fails, hidden on boot) -->
  <div id="fallback" style="position:fixed;inset:0;z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;color:#e6e4e0;font-family:Georgia,serif;text-align:center;padding:2rem;">
    <h1 style="font-size:2.5rem;margin-bottom:.5rem;">Jimmy Yang</h1>
    <p style="color:#e8993a;font-family:Consolas,monospace;margin-bottom:2rem;">{ AN AI Engineer }</p>
    <nav style="display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;">
      <a href="about/" style="color:#e8993a;text-decoration:none;padding:.5rem 1rem;border:1px solid rgba(255,255,255,.1);border-radius:6px;">个人信息</a>
      <a href="projects/" style="color:#e8993a;text-decoration:none;padding:.5rem 1rem;border:1px solid rgba(255,255,255,.1);border-radius:6px;">个人项目</a>
      <a href="research/" style="color:#e8993a;text-decoration:none;padding:.5rem 1rem;border:1px solid rgba(255,255,255,.1);border-radius:6px;">学术研究</a>
      <a href="engineering/" style="color:#e8993a;text-decoration:none;padding:.5rem 1rem;border:1px solid rgba(255,255,255,.1);border-radius:6px;">工程问题</a>
      <a href="notes/" style="color:#e8993a;text-decoration:none;padding:.5rem 1rem;border:1px solid rgba(255,255,255,.1);border-radius:6px;">技术小结</a>
    </nav>
  </div>

  <footer class="global-footer">
    <span class="footer-motto">No pain, no gain.</span>
    <span class="footer-copy">&copy; 2026 Jimmy Yang</span>
  </footer>
  <script src="script.js"></script>
</body>
</html>
